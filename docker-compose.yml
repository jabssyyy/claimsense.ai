version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: claimsense-postgres
    environment:
      POSTGRES_USER: claimsense
      POSTGRES_PASSWORD: password
      POSTGRES_DB: claimsense
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
